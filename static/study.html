<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>𝕯𝖊𝕾𝖍 𝗔𝗶 - Neural Supreme</title>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* ... (All your existing CSS remains exactly the same) ... */

    /* NEW AD STYLES */
    .top-ad-banner {
      width: 100%;
      max-width: 800px;
      margin: 10px auto 0;
      height: 90px;
      background: #f9f9f9;
      border: 1px dashed #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 8px;
    }

    /* Full-screen Ad Overlay */
    #adOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 9999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .ad-timer {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #f5b342;
    }

    .ad-content-placeholder {
        width: 300px;
        height: 250px;
        background: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="top-ad-banner">
    <ins class="adsbygoogle"
         style="display:inline-block;width:728px;height:90px"
         data-ad-client="ca-pub-0000"
         data-ad-slot="0000"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    <p style="color:#999; font-size:12px;">Advertisement</p>
  </div>

  <header class="header">
    <div class="logo-brand">
      <img src="static/logo.png" alt="Desh AI Logo" class="logo-char-img">
      <span class="brand-text-rest">𝖊𝕾𝖍 𝐀𝖎</span>
    </div>
  </header>

  <main id="chatContainer"></main>

  <div id="adOverlay">
    <div class="ad-content-placeholder">
        <span>Video Ad Playing...</span>
    </div>
    <div class="ad-timer">Wait <span id="seconds">5</span> seconds to continue...</div>
  </div>

  <div id="scrollTopBtn"><svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg></div>

  <div class="bottom-bar">
    <div class="input-box" id="inputBox">
      <button class="icon-btn mic-btn" id="micBtn">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <textarea id="question" placeholder="Ask 𝕯𝖊𝕾𝖍 𝐀𝖎..." rows="1"></textarea>
      <button id="sendBtn" class="icon-btn wave-mode">
        <svg id="waveIcon" viewBox="0 0 24 24"><rect x="3" y="10" width="2" height="4" rx="1"/><rect x="7" y="8" width="2" height="8" rx="1"/><rect x="11" y="5" width="2" height="14" rx="1"/><rect x="15" y="8" width="2" height="8" rx="1"/><rect x="19" y="10" width="2" height="4" rx="1"/></svg>
        <svg id="sendIcon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    /* ... (Keep all your existing JS code until the Send Button Logic) ... */

    const adOverlay = document.getElementById('adOverlay');
    const secondsSpan = document.getElementById('seconds');

    // MODIFIED SEND LOGIC
    sendBtn.onclick = () => {
      const q = input.value.trim();
      
      if (q.length === 0) {
        window.location.href = "/neon";
        return;
      }

      // 5-SECOND AD LOGIC
      showAdAndThen(() => {
        handleRequest();
      });
    };

    function showAdAndThen(callback) {
      adOverlay.style.display = 'flex';
      let count = 5;
      secondsSpan.innerText = count;

      const timer = setInterval(() => {
        count--;
        secondsSpan.innerText = count;
        if (count <= 0) {
          clearInterval(timer);
          adOverlay.style.display = 'none';
          callback(); // Runs the actual handleRequest after 5s
        }
      }, 1000);
    }

    /* ... (Keep the rest of your original functions: handleRequest, handleText, etc.) ... */
  </script>
</body>
</html>
